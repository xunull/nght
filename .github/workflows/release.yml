name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/xunull/nght:${{ steps.version.outputs.version }}
            ghcr.io/xunull/nght:${{ steps.version.outputs.version }}-amd64
            ghcr.io/xunull/nght:${{ steps.version.outputs.version }}-arm64
            ghcr.io/xunull/nght:latest
            ghcr.io/xunull/nght:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=nght
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Verify image version
        run: |
          docker pull ghcr.io/xunull/nght:${{ steps.version.outputs.version }}
          VERSION_OUTPUT=$(docker run --rm --entrypoint /nght ghcr.io/xunull/nght:${{ steps.version.outputs.version }} --version)
          echo "nght image --version output: $VERSION_OUTPUT"
          if ! echo "$VERSION_OUTPUT" | grep -q "${{ steps.version.outputs.version }}"; then
            echo "ERROR: image --version does not contain ${{ steps.version.outputs.version }}"
            exit 1
          fi

  chart-package:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          mark_as_latest: "false"
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR for OCI push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to OCI
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          helm push "charts/nght-${VERSION}.tgz" "oci://ghcr.io/xunull/charts"
