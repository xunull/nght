name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        if: runner.os != 'Windows'
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt issues:"
            echo "$out"
            exit 1
          fi

      - name: go test
        run: go test -race -v ./...

  build-matrix:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: cross-compile
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -o /dev/null .
